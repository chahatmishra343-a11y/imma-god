<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        :root {
            --bg-color: #ffe6eb;
            --text-color: #4a4a4a;
            --accent-color: #ff4d6d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var;
            overflow: hidden;
            transition: background 0.3s;
        }

        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(5px);
            max-width: 90%;
            width: 400px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            transition: all 0.2s;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, all 0.2s;
        }

        #yesBtn {
            background-color: #4cc9f0;
            color: white;
        }

        #noBtn {
            background-color: var;
            color: white;
        }

        /* --- Glitch Effects --- */
        .glitch {
            animation: shake 0.2s infinite;
            color: #ff0055 !important;
            text-shadow: 2px 2px #00ffff, -2px -2px #ff00ff;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* --- Error Screen Theme --- */
        .error-bg {
            background-color: #1a1a1a !important;
        }

        .error-box {
            background: #2a2a2a !important;
            color: #ff3333 !important;
            border: 2px solid #ff3333;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
        }

        /* --- Floating Hearts Background --- */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(255, 77, 109, 0.6);
            animation: floatUp 4s linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-105vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="heart-bg" id="heartBg"></div>

    <div class="container" id="mainContainer">
        <h1 id="questionText">Do you want to be my friend?</h1>
        <div class="btn-container" id="btnContainer">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const mainContainer = document.getElementById('mainContainer');
        const body = document.body;
        const heartBg = document.getElementById('heartBg');

        let noCount = 0;
        let yesScale = 1;

        // Array of glitching responses for the first 4 clicks
        const glitchPrompts = [
            "Are you sure? 🤔",
            "Error: Wrong choice... 🔐",
            "SYSTEM FAILURE WARNING ⚠️",
            "CRITICAL MISCLICK DETECTED 🛑"
        ];

        noBtn.addEventListener('click', () => {
            noCount++;

            if (noCount <= 4) {
                // Step 1: Glitch phase (Clicks 1-4)
                questionText.textContent = glitchPrompts[noCount - 1];
                
                // Add CSS glitch effects to text and buttons
                questionText.classList.add('glitch');
                yesBtn.classList.add('glitch');
                noBtn.classList.add('glitch');

                // Make the Yes button massive so it's easier to hit
                yesScale += 0.4;
                yesBtn.style.transform = `scale(${yesScale})`;

                // Change button texts playfully during the mystery glitch phase
                noBtn.textContent = "N-No?¿";
                yesBtn.textContent = "YES!";

                // Remove glitch animation briefly between clicks to reset the shake
                setTimeout(() => {
                    questionText.classList.remove('glitch');
                }, 400);

            } else if (noCount === 5) {
                // Step 2: 5th Click - System Error / "New Page" Transition
                questionText.classList.remove('glitch');
                yesBtn.classList.remove('glitch');
                noBtn.classList.remove('glitch');

                // Transform layout to look like a critical system error screen
                body.classList.add('error-bg');
                mainContainer.classList.add('error-box');
                
                // Show the "minimum you give note in error" style layout
                questionText.innerHTML = "CRITICAL ERROR<br><small>Status: Friend-zone Overflow</small>";
                
                // Set up the "New Page" redirection prompt
                noBtn.style.display = 'none';
                yesBtn.style.transform = 'scale(1)';
                yesBtn.style.backgroundColor = '#ff3333';
                yesBtn.textContent = "Initialize Fix (Click Here)";
            }
        });

        // The Success / New Page view (Triggered by Yes or the Error Fix button)
        function loadSuccessPage() {
            // Reset background and box styling back to gorgeous mode
            body.classList.remove('error-bg');
            body.style.backgroundColor = '#ffe5ec';
            
            mainContainer.className = 'container'; // Reset classes
            mainContainer.style.background = 'rgba(255, 255, 255, 0.9)';
            mainContainer.style.border = 'none';
            mainContainer.style.color = '#4a4a4a';

            // 1. Teddy Bear Hugging Animation (Using high-quality verified platform GIFs/Vectors)
            questionText.innerHTML = "Yay! Best Friends Forever! 🧸💖";
            
            // Injecting a lovely hugging teddy bear animation/graphic
            mainContainer.innerHTML = `
                <h1 style="color: #ff4d6d; font-size: 2.2rem;">Yay! Best Friends Forever! 🧸💖</h1>
                <div style="width: 100%; max-width: 250px; margin: 20px auto;">
                    <img src="https://media.tenor.com/gU_NPIwX_BIAAAAi/bear-panda.gif" 
                         alt="Teddies Hugging" 
                         style="width: 100%; border-radius: 15px;">
                </div>
                <p style="font-weight: 500; color: #666;">System repaired successfully!</p>
            `;

            // 2. Start the Background Floating Hearts Animation Loop
            setInterval(createHeart, 300);
        }

        // Attach success trigger to the Yes action
        yesBtn.addEventListener('click', loadSuccessPage);

        // Helper function to dynamically generate background animations
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '🌸'; // Soft aesthetic petals/hearts
            if(Math.random() > 0.5) heart.innerHTML = '💖';
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's'; // 3-5 seconds
            heart.style.fontSize = Math.random() * 1.5 + 1 + 'rem';
            
            heart.style.position = 'absolute';
            heart.style.bottom = '-50px';
            
            heart.addEventListener('animationend', () => {
                heart.remove();
            });
            
            heartBg.appendChild(heart);
        }
    </script>
</body>
</html>
