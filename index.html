<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        :root {
            --bg-color: #ffe6eb;
            --text-color: #4a4a4a;
            --accent-color: #ff4d6d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow: hidden;
            transition: background 0.3s;
        }

        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 400px;
            position: relative;
            z-index: 2;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            transition: all 0.2s;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, all 0.2s;
        }

        #yesBtn {
            background-color: #4cc9f0;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: var(--accent-color);
            color: white;
        }

        /* --- Glitch Effects --- */
        .glitch {
            animation: shake 0.2s infinite;
            color: #ff0055 !important;
            text-shadow: 2px 2px #00ffff, -2px -2px #ff00ff;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* --- Error Screen Theme --- */
        .error-bg {
            background-color: #1a1a1a !important;
        }

        .error-box {
            background: #2a2a2a !important;
            color: #ff3333 !important;
            border: 2px solid #ff3333;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
        }

        /* --- Floating Background Animation --- */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            animation: floatUp 4s linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-105vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="heart-bg" id="heartBg"></div>

    <div class="container" id="mainContainer">
        <h1 id="questionText">Do you want to be my friend?</h1>
        <div class="btn-container" id="btnContainer">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const mainContainer = document.getElementById('mainContainer');
        const body = document.body;
        const heartBg = document.getElementById('heartBg');

        let noCount = 0;
        let yesScale = 1;

        const glitchPrompts = [
            "Are you sure? 🤔",
            "Error: Wrong choice... 🔐",
            "SYSTEM FAILURE WARNING ⚠️",
            "CRITICAL MISCLICK DETECTED 🛑"
        ];

        noBtn.addEventListener('click', () => {
            noCount++;

            if (noCount <= 4) {
                questionText.textContent = glitchPrompts[noCount - 1];
                
                questionText.classList.add('glitch');
                yesBtn.classList.add('glitch');
                noBtn.classList.add('glitch');

                yesScale += 0.4;
                yesBtn.style.transform = `scale(${yesScale})`;

                noBtn.textContent = "N-No?¿";
                yesBtn.textContent = "YES!";

                setTimeout(() => {
                    questionText.classList.remove('glitch');
                }, 400);

            } else if (noCount === 5) {
                questionText.classList.remove('glitch');
                yesBtn.classList.remove('glitch');
                noBtn.classList.remove('glitch');

                body.classList.add('error-bg');
                mainContainer.classList.add('error-box');
                
                questionText.innerHTML = "CRITICAL ERROR<br><small>Status: Friend-zone Overflow</small>";
                
                noBtn.style.display = 'none';
                yesBtn.style.transform = 'scale(1)';
                yesBtn.style.backgroundColor = '#ff3333';
                yesBtn.textContent = "Initialize Fix (Click Here)";
            }
        });

        function loadSuccessPage() {
            body.classList.remove('error-bg');
            body.style.backgroundColor = '#ffe5ec';
            
            mainContainer.className = 'container'; 
            mainContainer.style.background = 'rgba(255, 255, 255, 0.95)';
            mainContainer.style.color = '#4a4a4a';

            // Updated with a highly reliable, incredibly cute animated emoji presentation!
            mainContainer.innerHTML = `
                <h1 style="color: #ff4d6d; font-size: 2.2rem; margin-bottom: 15px;">Yay! Best Friends Forever!</h1>
                <div style="font-size: 5rem; margin: 20px 0; animation: pulse 1.5s infinite;">
                    🧸🤗🧸
                </div>
                <p style="font-weight: 600; color: #ff758f; font-size: 1.2rem;">System repaired with 100% Love!</p>
            `;

            // Add a pulse animation style for the hugging teddies
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes pulse {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.15); }
                    100% { transform: scale(1); }
                }
            `;
            document.head.appendChild(style);

            setInterval(createHeart, 200);
        }

        yesBtn.addEventListener('click', loadSuccessPage);

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const items = ['🌸', '💖', '🧸', '✨', '💐'];
            heart.innerHTML = items[Math.floor(Math.random() * items.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's'; 
            heart.style.fontSize = Math.random() * 1.5 + 1.2 + 'rem';
            
            heart.style.position = 'absolute';
            heart.style.bottom = '-50px';
            
            heart.addEventListener('animationend', () => {
                heart.remove();
            });
            
            heartBg.appendChild(heart);
        }
    </script>
</body>
</html>
